<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Time Calculator</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #0f172a;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .stats-grid {
            display: flex;
            gap: 20px;
            justify-content: space-between;
        }

        .stat-card {
            flex: 1;
            background-color: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Reading Time Calculator</h1>
        
        <textarea id="textInput" placeholder="Paste or type your article content here..."></textarea>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Word Count</div>
                <div id="wordCount" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Est. Reading Time</div>
                <div id="readingTime" class="stat-value">0 min</div>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const wordCountDisplay = document.getElementById('wordCount');
        const readingTimeDisplay = document.getElementById('readingTime');

        // Average adult reading speed (Words Per Minute)
        const WORDS_PER_MINUTE = 200; 

        textInput.addEventListener('input', () => {
            const text = textInput.value.trim();
            
            // Calculate word count cleanly by handling multiple spaces and line breaks
            const words = text === "" ? [] : text.split(/\s+/);
            const wordCount = words.length;

            // Calculate reading time in minutes
            const readingTime = Math.ceil(wordCount / WORDS_PER_MINUTE);

            // Update UI elements
            wordCountDisplay.textContent = wordCount;
            
            if (wordCount === 0) {
                readingTimeDisplay.textContent = "0 min";
            } else if (readingTime === 1) {
                readingTimeDisplay.textContent = "Less than a min";
            } else {
                readingTimeDisplay.textContent = `~ ${readingTime} min`;
            }
        });
    </script>

</body>
</html>
>
